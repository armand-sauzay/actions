name: Release

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: ./lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: ./test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: ./release

  publish-docs:
    name: Publish docs
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: ./publish-docs